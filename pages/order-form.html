<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Order Form — Northwest Custom Apparel</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Work+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="order-form/styles.css?v=20260502-9" />
<link rel="stylesheet" href="order-form/paper.css?v=20260502-2" />
<link rel="stylesheet" href="order-form/print.css?v=20260502-1" />
</head>
<body class="layout-single">

<div id="root"></div>

<!-- Tweak defaults (extracted from inline per NWCA no-inline-code rule) -->
<script src="order-form/init.js?v=20260422-2"></script>

<!-- React + Babel (prototype-fidelity: matches design bundle) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="order-form/shopworks.js?v=20260502-2"></script>

<!-- Pricing engines (existing + new sticker/emblem services) — must load before the registry -->
<script src="../shared_components/js/product-category-filter.js?v=20260502-1"></script>
<script src="../shared_components/js/embroidery-pricing-service.js?v=20260502-1"></script>
<script src="../shared_components/js/cap-embroidery-pricing-service.js?v=20260502-1"></script>
<script src="../shared_components/js/screenprint-pricing-service.js?v=20260502-1"></script>
<script src="../shared_components/js/dtg-pricing-service.js?v=20260502-1"></script>
<script src="../shared_components/js/dtf-pricing-service.js?v=20260502-1"></script>
<script src="../shared_components/js/sticker-pricing-service.js?v=20260502-1"></script>
<script src="../shared_components/js/emblem-pricing-service.js?v=20260502-1"></script>

<!-- ShopWorks size-suffix mapping (PC61 → PC61_2XL / PC61_3XL etc.) — used
     for breakdown-row display + SanMar inventory check. The MO push itself
     sends BASE PNs; ShopWorks's Size Translation Table appends the modifier. -->
<script src="../shared_components/js/order-form-size-suffix.js?v=20260502-5"></script>

<!-- SanMar inventory — ManageOrders service + order-form's multi-SKU wrapper.
     Powers the per-size stock badges and out-of-stock blocking on each row. -->
<script src="../shared_components/js/manageorders-inventory-service.js?v=20260502-2"></script>
<script src="order-form/inventory/inventory-check.js?v=20260502-4"></script>

<!-- Order-form pricing substrate (registry + shared utilities) -->
<script src="order-form/pricing/shared.js?v=20260502-1"></script>
<script src="order-form/pricing/registry.js?v=20260502-1"></script>

<!-- Method modules — each registers itself with OrderFormPricing on load.
     Order doesn't matter between methods, but they must come AFTER registry.js. -->
<script type="text/babel" data-presets="react" src="order-form/pricing/methods/embroidery.jsx?v=20260502-4"></script>
<script type="text/babel" data-presets="react" src="order-form/pricing/methods/screenprint.jsx?v=20260502-2"></script>
<script type="text/babel" data-presets="react" src="order-form/pricing/methods/dtg.jsx?v=20260502-2"></script>
<script type="text/babel" data-presets="react" src="order-form/pricing/methods/dtf.jsx?v=20260502-2"></script>
<script type="text/babel" data-presets="react" src="order-form/pricing/methods/sticker.jsx?v=20260502-1"></script>
<script type="text/babel" data-presets="react" src="order-form/pricing/methods/emblem.jsx?v=20260502-1"></script>

<!-- Component scripts (transpiled from JSX in-browser by Babel standalone) -->
<script type="text/babel" data-presets="react" src="order-form/components/common.jsx?v=20260422-2"></script>
<script type="text/babel" data-presets="react" src="order-form/components/line-items.jsx?v=20260502-2"></script>
<script type="text/babel" data-presets="react" src="order-form/components/totals.jsx?v=20260502-2"></script>
<script type="text/babel" data-presets="react" src="order-form/components/artwork.jsx?v=20260422-2"></script>
<script type="text/babel" data-presets="react" src="order-form/components/tweaks.jsx?v=20260422-2"></script>
<script type="text/babel" data-presets="react" src="order-form/components/print-sheet.jsx?v=20260502-3"></script>
<script type="text/babel" data-presets="react" src="order-form/components/paper-form.jsx?v=20260502-13"></script>
<script type="text/babel" data-presets="react" src="order-form/app.jsx?v=20260502-1"></script>

</body>
</html>
