<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Employee Handbook — Northwest Custom Apparel</title>
    <link rel="icon" href="https://cdn.caspio.com/A0E15000/Safety%20Stripes/NWCA%20Favicon%20for%20TEAMNWCA.com.png?ver=1" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/pages/css/policies-hub-v2.css?v=2026.05.27.2">
    <link rel="stylesheet" href="/pages/css/handbook.css?v=2026.05.27.2">
</head>
<body class="handbook-body">

    <!-- Top bar -->
    <header class="detail-topbar handbook-topbar">
        <a href="/pages/policies-hub.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Hub
        </a>
        <div class="detail-topbar-title">
            <i class="fas fa-book-open"></i>
            Employee Handbook
        </div>
        <div class="handbook-topbar-actions">
            <a href="/forms/Employee-Handbook-Latest.pdf" target="_blank" rel="noopener" class="btn btn-primary handbook-pdf-btn">
                <i class="fas fa-file-pdf"></i> Download PDF
            </a>
            <button id="handbookPrintBtn" class="btn btn-secondary handbook-print-btn">
                <i class="fas fa-print"></i> Print
            </button>
        </div>
    </header>

    <div class="handbook-layout">

        <!-- Sticky TOC sidebar -->
        <aside class="handbook-toc-sidebar" aria-label="Handbook table of contents">
            <div class="handbook-toc-title">Contents</div>
            <nav id="handbookToc" class="handbook-toc-nav">
                <div class="handbook-toc-loading">Loading…</div>
            </nav>
            <div class="handbook-toc-footer">
                <small>Living document — synced from the Policies Hub. Last loaded: <span id="handbookLoadedAt">—</span></small>
            </div>
        </aside>

        <!-- Main reader -->
        <main class="handbook-main">
            <div id="handbookContent">
                <div class="handbook-loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading handbook…
                </div>
            </div>
        </main>

    </div>

    <!-- Scripts -->
    <script src="/shared_components/js/policies/handbook-reader.js?v=2026.05.27.2"></script>
</body>
</html>
