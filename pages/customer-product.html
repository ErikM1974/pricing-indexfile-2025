<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Product - Northwest Custom Apparel</title>
    <link rel="icon" type="image/png" href="https://northwestcustomapparel.box.com/shared/static/8ngf6qvtbq32bjlt97l7fkr0plmaw2o4.png">
    <link rel="stylesheet" href="/pages/css/customer-portal.css?v=2026.07.17.11">
    <link rel="stylesheet" href="/pages/css/customer-product.css?v=2026.07.04.4">
    <link rel="stylesheet" href="/pages/css/portal-reorder-list.css?v=2026.07.03.1">
</head>
<body>
    <header class="cp-header">
        <img src="https://northwestcustomapparel.box.com/shared/static/8ngf6qvtbq32bjlt97l7fkr0plmaw2o4.png"
             alt="NWCA" class="cp-header-logo" onerror="this.style.display='none'">
        <div class="cp-header-text">
            <h1>Your Account</h1>
            <p>Northwest Custom Apparel</p>
        </div>
    </header>

    <div class="cp-loading" id="pp-loading">
        <div class="cp-spinner"></div>
        <div class="cp-loading-text">Loading product&hellip;</div>
    </div>

    <div class="cp-error" id="pp-error" style="display:none;">
        <div class="cp-error-icon">&#9888;</div>
        <div class="cp-error-title" id="pp-error-title">Something went wrong</div>
        <div class="cp-error-message" id="pp-error-message">Please try again or contact us at (253) 922-5793.</div>
    </div>

    <main class="cp-main" id="pp-content" style="display:none;">
        <a class="pp-back" id="pp-back" href="/portal">&larr; Back to your account</a>
        <div id="pp-body"></div>
    </main>

    <div class="cp-toast" id="cp-toast"></div>

    <div class="cp-footer">
        Northwest Custom Apparel &middot; (253) 922-5793 &middot; sales@nwcustomapparel.com
    </div>

    <!-- Pricing engine (identical chain to Quick Quote) for the embroidery-upgrade price matrix — Rule 9 -->
    <script src="/config/app.config.js?v=2026.07.08.1"></script>
    <script src="/shared_components/js/decoration-methods.js?v=2026.07.01.1"></script>
    <script src="/shared_components/js/embroidery-pricing-service.js?v=2026.07.01.1"></script>
    <script src="/shared_components/js/cap-embroidery-pricing-service.js?v=2026.07.01.1"></script>
    <script src="/shared_components/js/embroidery-quote-pricing.js?v=2026.07.07.7"></script>
    <script src="/shared_components/js/quote-cart-engine.js?v=2026.07.07.7"></script>
    <script src="/pages/js/portal-reorder-list.js?v=2026.07.04.4"></script>
    <script src="/pages/js/customer-product.js?v=2026.07.05.1"></script>
</body>
</html>
