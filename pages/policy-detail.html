<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Policy Detail — Northwest Custom Apparel</title>
    <link rel="icon" href="/favicon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/pages/css/policies-hub-v2.css?v=2026.05.29.11">
    <link rel="stylesheet" href="/pages/css/policy-detail.css?v=2026.07.10.7">
    <link rel="stylesheet" href="/pages/css/org-chart-2026.css?v=2026.07.14.4">
</head>
<body class="policy-detail-body">

    <!-- Hidden Caspio auth embed — used by policies-admin-gate.js to
         auto-bootstrap the Express CRM session if the viewer is already
         signed in to Caspio. Without this, edit affordances stay hidden. -->
    <div class="caspio-auth" hidden>
        <div id="auth-firstname">[@authfield:First_Name]</div>
        <div id="auth-lastname">[@authfield:Last_Name]</div>
        <div id="auth-email">[@authfield:Email]</div>
        <div id="auth-role">[@authfield:Role]</div>
        <script type="text/javascript" src="https://c3eku948.caspio.com/dp/a0e15000a0bb470ed2be4ec5943e/emb"></script>
    </div>

    <header class="detail-topbar">
        <a href="/pages/policies-hub.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Hub
        </a>
        <div class="detail-topbar-title">
            <i class="fas fa-book-open"></i>
            Company Policies
        </div>
    </header>

    <div id="detailRoot" class="detail-layout">

        <main class="detail-main">

            <!-- Breadcrumb -->
            <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

            <!-- Title -->
            <h1 class="policy-title" id="policyTitle">Loading…</h1>

            <!-- Summary -->
            <div class="policy-summary" id="policySummary"></div>

            <!-- Meta row (or edit form fields when editing) -->
            <div class="policy-meta-row" id="policyMeta"></div>

            <!-- Body (rendered HTML, or TipTap editor when editing) -->
            <div class="policy-body" id="policyBody"></div>

            <!-- Actions: Edit / Save / Cancel / Archive -->
            <div class="policy-actions" id="policyActions"></div>

            <!-- Sub-procedures (children) -->
            <section class="sub-procedures" id="subProcedures" style="display:none"></section>

            <!-- Discussion / comments -->
            <section id="commentsSection" style="display:none"></section>

        </main>

        <!-- Outline (auto-generated from headings) -->
        <aside class="outline-sidebar" id="policyOutline" style="display:none" aria-label="Page outline"></aside>

    </div>

    <!-- Scripts -->
    <script src="/shared_components/js/policies/policies-admin-gate.js?v=20260514-12"></script>
    <script src="/shared_components/js/policies/policies-api.js?v=20260514-12"></script>
    <script src="/shared_components/js/policies/policy-editor-tiptap.js?v=20260516-rich-html"></script>
    <script src="/shared_components/js/policies/policy-ai-assist.js?v=20260514-12"></script>
    <script src="/shared_components/js/policies/policy-lightbox.js?v=20260514-12"></script>
    <script src="/shared_components/js/policies/policy-mermaid.js?v=20260514-12"></script>
    <script src="/shared_components/js/policies/policy-comments.js?v=20260514-12"></script>
    <script src="/shared_components/js/policies/org-chart-2026.js?v=2026.07.14.4"></script>
    <script src="/shared_components/js/policies/policy-detail.js?v=2026.07.08.8"></script>
</body>
</html>
