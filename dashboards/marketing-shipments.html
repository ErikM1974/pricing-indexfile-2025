<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Marketing Shipments - Northwest Custom Apparel</title>
    <link rel="icon" href="https://cdn.caspio.com/A0E15000/Safety%20Stripes/NWCA%20Favicon%20for%20TEAMNWCA.com.png?ver=1" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 2026 design tokens (must load before dash-shell.css) -->
    <link rel="stylesheet" href="/shared_components/css/art-hub.css">
    <link rel="stylesheet" href="/shared_components/css/dash-shell.css">
    <link rel="stylesheet" href="/dashboards/css/leads.css?v=2026.07.19.6">
    <link rel="stylesheet" href="/dashboards/css/marketing-shipments.css?v=2026.07.19.1">
</head>
<body>
    <div class="dash-shell">
        <header class="dash-header">
            <div class="dash-header-left">
                <a href="/staff-dashboard.html" title="Back to Staff Dashboard">
                    <img src="https://cdn.caspio.com/A0E15000/Safety%20Stripes/web%20northwest%20custom%20apparel%20logo.png?ver=1"
                         alt="Northwest Custom Apparel" class="dash-header-logo">
                </a>
                <h1 class="dash-header-title">Marketing Shipments</h1>
            </div>
            <div class="dash-header-right">
                <button type="button" id="btn-refresh" class="ld-refresh-btn" title="Reload the queue">
                    <i class="fas fa-rotate"></i> Refresh
                </button>
                <a href="/staff-dashboard.html" class="dash-back-link">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </a>
            </div>
        </header>

        <main class="dash-content">
            <div class="dash-error-banner" role="alert">
                <i class="fas fa-exclamation-triangle"></i>
                <span class="dash-error-banner-message"></span>
                <button class="dash-error-banner-close" aria-label="Dismiss"><i class="fas fa-times"></i></button>
            </div>

            <div class="dash-card">
                <div class="dash-card-header ld-toolbar-header">
                    <h2 class="dash-card-title">Kit queue</h2>
                    <span class="ld-count" id="ms-count"></span>
                    <div class="ld-view-toggle" role="group" aria-label="Status">
                        <button type="button" class="ld-toggle-btn ms-tab" data-status="Requested" aria-pressed="true">Requested</button>
                        <button type="button" class="ld-toggle-btn ms-tab" data-status="Packed" aria-pressed="false">Packed</button>
                        <button type="button" class="ld-toggle-btn ms-tab" data-status="Shipped" aria-pressed="false">Shipped</button>
                    </div>
                </div>
                <div class="ld-table-scroll">
                    <table class="ld-table" id="ms-table">
                        <thead>
                            <tr>
                                <th>Requested</th>
                                <th>Recipient</th>
                                <th>Ship to</th>
                                <th>Contents</th>
                                <th>AE</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ms-tbody">
                            <tr><td colspan="6" class="ld-empty dash-loading">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/config/app.config.js"></script>
    <script src="/shared_components/js/fetch-timeout.js"></script>
    <script src="/shared_components/js/dash-page-helpers.js"></script>
    <script src="/dashboards/js/marketing-shipments.js?v=2026.07.19.1"></script>
</body>
</html>
