<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Old Designs Archive - Northwest Custom Apparel</title>
    <link rel="icon" href="https://cdn.caspio.com/A0E15000/Safety%20Stripes/NWCA%20Favicon%20for%20TEAMNWCA.com.png?ver=1" type="image/png">
    <link rel="stylesheet" href="/shared_components/css/old-designs.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="minimal-header">
        <img src="https://cdn.caspio.com/A0E15000/Safety%20Stripes/web%20northwest%20custom%20apparel%20logo.png?ver=1" alt="Northwest Custom Apparel" class="logo">
        <a href="/staff-dashboard.html" class="back-link">Back to Dashboard</a>
    </div>

    <div class="content-container">
        <h1 class="page-title">Old Designs Archive</h1>
        <span class="page-subtitle">Search archived designs from Megafile directories</span>
        <div class="caspio-container">
            <script type="text/javascript" src="https://c3eku948.caspio.com/dp/a0e150006e417291bd264106a505/emb"></script>
        </div>
    </div>

    <div class="image-modal-overlay" id="image-modal">
        <button class="modal-nav modal-prev" aria-label="Previous image"><i class="fa-solid fa-chevron-left"></i></button>
        <img src="" alt="Design preview">
        <button class="modal-nav modal-next" aria-label="Next image"><i class="fa-solid fa-chevron-right"></i></button>
        <span class="modal-counter"></span>
    </div>

    <div class="sticky-search-bar" id="sticky-search-bar"></div>
    <div id="toast-container"></div>

    <script src="/shared_components/js/old-designs.js"></script>
</body>
</html>
