<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Customer Portals - Northwest Custom Apparel</title>
    <link rel="icon" href="https://cdn.caspio.com/A0E15000/Safety%20Stripes/NWCA%20Favicon%20for%20TEAMNWCA.com.png?ver=1" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/dashboards/css/portal-directory.css?v=1" rel="stylesheet">
</head>
<body>
    <div class="pd-page">
        <!-- Header -->
        <header class="pd-header">
            <div class="pd-header-left">
                <img src="https://cdn.caspio.com/A0E15000/Safety%20Stripes/web%20northwest%20custom%20apparel%20logo.png?ver=1"
                     alt="NWCA" class="pd-header-logo"
                     onerror="this.style.display='none'">
                <h1 class="pd-header-title">Customer Portals</h1>
            </div>
            <a href="/staff-dashboard.html" class="pd-back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </header>

        <div class="pd-content">
            <!-- Toolbar -->
            <div class="pd-toolbar" id="pd-toolbar" style="display:none;">
                <div class="pd-search-wrap">
                    <i class="fas fa-search pd-search-icon"></i>
                    <input type="text" class="pd-search" id="pd-search"
                           placeholder="Search companies...">
                </div>
                <select class="pd-sort" id="pd-sort">
                    <option value="lastUpdated">Last Updated</option>
                    <option value="nameAZ">Company A-Z</option>
                    <option value="mostItems">Most Items</option>
                </select>
                <div class="pd-stats" id="pd-stats"></div>
            </div>

            <!-- Loading -->
            <div class="pd-loading" id="pd-loading">
                <div class="pd-spinner"></div>
                <div class="pd-loading-text">Loading customer portals...</div>
            </div>

            <!-- Error -->
            <div class="pd-error" id="pd-error" style="display:none;">
                <div class="pd-error-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="pd-error-title" id="pd-error-title">Unable to Load</div>
                <div class="pd-error-message" id="pd-error-message">Please refresh the page or try again later.</div>
            </div>

            <!-- Card Grid -->
            <div class="pd-grid" id="pd-grid" style="display:none;"></div>

            <!-- Empty State -->
            <div class="pd-empty" id="pd-empty" style="display:none;">
                <div class="pd-empty-icon"><i class="fas fa-globe"></i></div>
                <div class="pd-empty-text">No customer portals yet. Portals are created when mockups or art requests are submitted.</div>
            </div>
        </div>

        <!-- Toast -->
        <div class="pd-toast" id="pd-toast"></div>

        <!-- Footer -->
        <div class="pd-footer">
            Northwest Custom Apparel &middot; (253) 922-5793
        </div>
    </div>

    <script src="/shared_components/js/app-config.js"></script>
    <script src="/dashboards/js/portal-directory.js?v=1"></script>
</body>
</html>
